# Grimoire source manifest.
#
# Each entry is cloned by `grimoire.py fetch` into data/sources/<name>, optionally
# built by `grimoire.py build` (per `build:` adapter), and indexed for search by
# `grimoire.py index`.
#
# Fields:
#   name      : unique slug (also the clone dir name)
#   title     : human label shown in the UI
#   repo      : git URL (omit for type: local)
#   category  : grouping shown/filtered in the UI
#   build     : native build system (mdbook|mkdocs|jekyll|hugo|markdown)
#   docs_dir  : (optional) subdir to index/build; default = whole repo
#   sparse    : (optional) list of paths to sparse-checkout for huge repos
#   org       : (optional) GitHub org/user - clones every public repo
#   pdf_url   : (optional) direct PDF URL to download and index (needs pdftotext)
#   index_ext : (optional) extra file extensions to index, e.g. [.json] [.ipynb]
#
# To add your own docs: drop markdown into ./custom/ (auto-indexed), or add a
# `type: local` entry here pointing at a path.

sources:

